# env: sit ,  cicd pipeline for vTransact application 

name: Java CI with Maven
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist_credentials: false
      
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven in Batch mode
        run: mvn -B package --file pom.xml

  security-check:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist_credentials: false
          fetch-depth: 0
       
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          # FIXED: Swapped out broken github.io link for official Aqua Security URLs
          wget -qO - https://github.io | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://github.io $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: install gitleaks
        run: |
          wget -qO gitleaks.tar.gz https://github.com
          sudo tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
      - name: setup trivy fs
        run: trivy fs --format table -o trivy-fs-report.json .
      - name: gitleaks detect source code
        run: gitleaks detect --source . -r gitleaks-report.json -f json 
        
        
          
