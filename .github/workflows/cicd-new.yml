# env: sit ,  cicd pipeline for vTransact application 

name: cicd pipeline 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  
jobs:
  compile:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist_credentials: false
      
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven in Batch mode
        run: mvn -B package --file pom.xml

  security-check:
    runs-on: self-hosted
    needs: compile
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist_credentials: false
          fetch-depth: 0
       
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install trivy
        run: |
          sudo apt-get update -y && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          # FIXED: Swapped out broken github.io link for official Aqua Security URLs
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: install gitleaks
        run: sudo apt-get install -y gitleaks
      - name: setup trivy fs
        run: trivy fs --format table -o trivy-fs-report.json .
      - name: gitleaks detect source code
        run: gitleaks detect --source . -r gitleaks-report.json -f json 
        
  test:
    runs-on: self-hosted
    needs: security-check
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist_credentials: false
      
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Unit test with maven 
        run: mvn test
          

  build_project_and_sonar_qube:
    runs-on: self-hosted
    needs: test
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist_credentials: false
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build the project
        run: mvn clean package

